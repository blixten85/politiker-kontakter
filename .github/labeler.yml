scraper:
  - changed-files:
    - any-glob-to-any-file: 'scraper/**'

data:
  - changed-files:
    - any-glob-to-any-file:
      - '**.txt'
      - '**.csv'
      - 'output/**'

ci:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

docker:
  - changed-files:
    - any-glob-to-any-file:
      - '**/Dockerfile'
      - 'docker-compose*.yml'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**.md'

dependencies:
  - changed-files:
    - any-glob-to-any-file: '**/requirements*.txt'
